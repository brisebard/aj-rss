name: Générer le flux RSS

on:
  schedule:
    - cron: "0 * * * *"   # toutes les heures pile
  workflow_dispatch:        # bouton pour lancer manuellement

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Configurer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Créer le dossier docs si absent
        run: mkdir -p docs

      - name: Générer le RSS
        run: python generate_rss.py

      - name: Pousser le fichier RSS
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/rss.xml
          git diff --cached --quiet || git commit -m "🔄 Mise à jour RSS $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
